name: 🚀 Build and Deploy Portfolio Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  registry: ghcr.io
  image_name: ${{ github.repository }}

jobs:

  security:
    uses: ./.github/workflows/security.yml
    secrets : inherit

  quality:
    uses: ./.github/workflows/quality.yml
    secrets : inherit

  test:
    uses: ./.github/workflows/test.yml
    secrets : inherit


  build-and-push:
    uses: ./.github/workflows/build.yml
    needs: [security, test]
    permissions:
      contents: read
      packages: write
    secrets : inherit


  deploy:
    uses: ./.github/workflows/deploy.yml
    needs: [build-and-push]
    secrets : inherit
