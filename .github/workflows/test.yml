name: Run tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test
        env:
          CI: true
          NODE_ENV: test

      - name: Test build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
          NODE_ENV: test